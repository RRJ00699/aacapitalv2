name: AACapital Quarterly Backfill
on:
  schedule:
    - cron: "0 4 1 1,4,7,10 *"   # 1st of each quarter, 09:30 IST
  workflow_dispatch:
jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      KITE_API_KEY:      ${{ secrets.KITE_API_KEY }}
      KITE_API_SECRET:   ${{ secrets.KITE_API_SECRET }}
      KITE_USER_ID:      ${{ secrets.KITE_USER_ID }}
      KITE_PASSWORD:     ${{ secrets.KITE_PASSWORD }}
      KITE_TOTP_SECRET:  ${{ secrets.KITE_TOTP_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Refresh Kite token
        run: python _scripts/refresh_kite_token.py
      - name: Quarterly candle backfill
        run: python _scripts/ipo_candle_backfill.py
