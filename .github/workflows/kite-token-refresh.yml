name: Kite Token Refresh

on:
  schedule:
    - cron: '30 2 * * 1-5'   # 8:00 AM IST Mon-Fri
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyotp kiteconnect psycopg2-binary python-dotenv

      - name: Refresh Kite token
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
          DATABASE_URL:     ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL:${{ secrets.NEON_DATABASE_URL }}
        run: python _scripts/refresh_kite_token.py

      - name: Confirm token in DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python3 -c "
          import psycopg2, os
          conn = psycopg2.connect(os.environ['DATABASE_URL'])
          cur  = conn.cursor()
          cur.execute(\"SELECT key, LEFT(value,8)||'...' as token, updated_at FROM platform_config WHERE key='kite_access_token'\")
          row = cur.fetchone()
          print(f'Token in DB: {row}')
          conn.close()
          "
