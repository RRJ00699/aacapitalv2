name: IPO nightly pipeline
on:
  schedule:
    - cron: "30 23 * * *"      # 18:30 America/Chicago (UTC-5) → 23:30 UTC. Adjust for DST if needed.
  workflow_dispatch: {}         # lets you run it manually from the Actions tab
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install pandas numpy psycopg2-binary rapidfuzz openpyxl requests playwright && python -m playwright install chromium
      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
        run: python _scripts/run_ipo_pipeline.py
