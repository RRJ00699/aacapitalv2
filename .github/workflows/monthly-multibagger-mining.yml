name: Monthly Multibagger Mining

on:
  schedule:
    # 1st of month at 6:00 AM IST = 12:30 AM UTC
    - cron: "30 0 1 * *"
  workflow_dispatch:
    inputs:
      min_gain:
        description: "Minimum historical gain % (e.g. 500 for 5x)"
        required: false
        default: "500"

jobs:
  multibagger-mining:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Full indicator calculation
        env:
          DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: npx tsx _scripts/engines/indicator_calculator.ts --mode full

      - name: Mine historical multibagger patterns
        env:
          DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: npx tsx _scripts/engines/historical_multibagger_miner.ts --min-gain ${{ github.event.inputs.min_gain || '500' }}

      - name: Sync to Neon
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DATABASE_URL:      ${{ secrets.LOCAL_DATABASE_URL }}
        run: npx tsx _scripts/sync-signals-to-neon.ts

      - name: Summary
        run: echo "✅ Monthly multibagger mining complete"
