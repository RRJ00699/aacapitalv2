name: AACapital Daily

# Two automated runs that fill the entire Today page:
#   • pre-open  08:15 IST  — refresh context before the market opens
#   • post-close 19:00 IST — full EOD refresh (today's candle → signals)
# Step order is dependency-correct: schema → token → candles → signals →
# IPO data → regime → market snapshot (reads regime) → flows → global.
# Core steps hard-fail; per-feed steps are continue-on-error so one bad feed
# doesn't red the whole run.

on:
  schedule:
    - cron: "45 2 * * 1-5"      # 08:15 IST Mon–Fri (pre-open)
    - cron: "30 13 * * 1-5"     # 19:00 IST Mon–Fri (post-close)
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:     ${{ secrets.DATABASE_URL }}
      KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
      KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
      KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
      KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
      KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ensure prod schema on Neon
        run: python _scripts/apply_prod_schema.py

      - name: Refresh Kite token
        run: python _scripts/refresh_kite_token.py

      - name: Sync candles Kite -> Neon
        run: python _scripts/kite-sync-candles.py --days 1 --target neon

      - name: Generate signals (technical_signals)
        run: python _scripts/generate_signals.py --limit 500

      - name: Fetch NSE IPOs (ipo_intelligence)
        continue-on-error: true
        run: python _scripts/ipo/fetch_nse_ipos.py

      - name: Market regime (market_regimes)
        run: python _scripts/engines/market_regime.py

      - name: Market snapshot + IPO predictions (market_snapshot)
        run: python _scripts/prod/kite_sync_and_predict.py --mode all

      - name: FII/DII flows (daily_institutional_flows)
        continue-on-error: true
        run: python _scripts/fetch_fii_dii.py

      - name: Global markets cache
        continue-on-error: true
        run: python _scripts/seed_global_cache.py
