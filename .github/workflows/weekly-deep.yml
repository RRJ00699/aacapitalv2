# AACapital — Weekly deep refresh (GitHub Actions)
# Replaces: management-commentary, on-demand-commentary  (delete those two)
# NOTE: train_multibagger_model.py is intentionally NOT included — the pattern-match
#       engine failed out-of-sample validation. Re-add only if a real edge is proven.
name: Weekly Deep
on:
  schedule:
    - cron: '30 2 * * 0'     # 08:00 IST Sunday
  workflow_dispatch:
jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install psycopg2-binary requests anthropic python-dotenv
      - name: Score management commentary
        run: python _scripts/score_management_commentary.py --all --limit 100
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
