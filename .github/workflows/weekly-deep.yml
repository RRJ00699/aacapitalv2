name: Weekly Deep
on:
  schedule:
    - cron: "0 3 * * 0"          # Sundays 08:30 IST
  workflow_dispatch:
jobs:
  deep:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Score management commentary (all recommended)
        run: python _scripts/score_management_commentary.py --recommended
