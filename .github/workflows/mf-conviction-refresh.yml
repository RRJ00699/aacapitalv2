name: AACapital MF Conviction Refresh

# Refreshes the 💎 new-conviction signal monthly from Screener (the source this repo
# already uses — AMFI-direct and the AMC sites are JS/403 and unreachable to naive fetches).
# Runs the documented pipeline IN ORDER:
#   load (Screener) → canonicalize → reconcile → compute flags → freshness.
#
# NOTE on build_isin_symbol_map: deliberately NOT a step here. scrape_amfi.py scrapes
# per-stock and writes mf_scheme_holdings.nse_symbol directly, so Screener rows are already
# symbol-mapped. (build_isin is only needed by the folder/parse path, and data/EQUITY_L.csv
# is gitignored so it couldn't run in CI anyway.)
#
# Required repo Secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL, SCREENER_USERNAME, SCREENER_PASSWORD
# Optional: NOTIFY_WEBHOOK (the one ipo-daily uses) for failure pings.
#
# Uses _scripts/scrape_amfi.py (env-only credentials) — NOT scrape_amfi_screener.py,
# which has credentials hardcoded and should be deleted from the repo + git history.
#
# Caveat: this schedules an authenticated Screener scrape. It's monthly (low frequency),
# but automated scraping can run against site ToS — cadence and --limit are the dials.

on:
  schedule:
    - cron: '0 4 12 * *'      # 12th each month, 04:00 UTC (~09:30 IST), after the SEBI 10-day deadline
  workflow_dispatch:           # manual "Run workflow" button — use this to test first

jobs:
  mf-refresh:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
      MF_EDGE_DAYS: "90"       # flag lifetime (the backtested ~1-3mo edge window)
      MF_MIN_FUNDS: "1"        # min funds initiating to raise a flag

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: 1) Load holdings from Screener (writes nse_symbol directly)
        run: python _scripts/scrape_amfi.py --limit 500

      - name: 2) Canonicalize scheme + amc names (prevents fake "new buy" flags)
        run: python _scripts/mf/canonicalize_mf_schemes.py

      - name: 3) Reconcile disclosures (prune redundant fortnights)
        run: python _scripts/mf/reconcile_mf_disclosures.py

      - name: 4) Compute conviction flags (💎)
        run: python _scripts/mf/compute_mf_conviction_flags.py

      - name: 5) Freshness report (heartbeat — which funds are going stale)
        run: python _scripts/mf/mf_freshness_monitor.py

      - name: Notify on failure
        if: failure()
        env:
          HOOK: ${{ secrets.NOTIFY_WEBHOOK }}
        run: |
          [ -z "$HOOK" ] && echo "NOTIFY_WEBHOOK not set; skipping" && exit 0
          curl -s -X POST "$HOOK" -H "Content-Type: application/json" \
            -d "{\"text\":\"AACapital MF Conviction Refresh FAILED - run ${GITHUB_RUN_ID}\",\"content\":\"https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" || true
