name: Daily Candle + Signals Sync

on:
  schedule:
    - cron: '30 11 * * 1-5'  # 5:00 PM IST Mon-Fri (after market close)
  workflow_dispatch:
    inputs:
      top:
        description: 'Number of top stocks to sync'
        required: false
        default: '200'
      days:
        description: 'Days of history'
        required: false
        default: '30'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install psycopg2-binary requests

      - name: Sync candles Local → Neon
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: |
          TOP="${{ github.event.inputs.top || '200' }}"
          DAYS="${{ github.event.inputs.days || '30' }}"
          echo "Syncing top $TOP stocks, last $DAYS days"
          python _scripts/sync_candles_to_neon.py --top $TOP --days $DAYS
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node deps
        run: npm ci --ignore-scripts

      - name: Generate signals from candles
        env:
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: python _scripts/generate_signals.py --limit 500
        continue-on-error: true

      - name: Sync signals Local → Neon
        env:
          NEON_DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: npx tsx _scripts/sync-signals-to-neon.ts
        continue-on-error: true

      - name: Summary
        run: echo "Candle + signal sync complete for $(date '+%Y-%m-%d')"
