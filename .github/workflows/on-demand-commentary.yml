name: On-Demand Commentary Scraper

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'NSE symbols space-separated (e.g. ARVIND INFY TCS)'
        required: true
        default: 'ARVIND'
      force:
        description: 'Force re-score even if exists'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests beautifulsoup4 pdfplumber psycopg2-binary
      - name: Run scraper
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          SCREENER_USERNAME:  ${{ secrets.SCREENER_USERNAME }}
          SCREENER_PASSWORD:  ${{ secrets.SCREENER_PASSWORD }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python _scripts/score_management_commentary.py \
            --symbols ${{ github.event.inputs.symbols }} \
            $FORCE_FLAG
