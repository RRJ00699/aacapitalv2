name: AACapital Monthly AMFI
on:
  schedule:
    - cron: "0 2 1 * *"          # 1st of month, 07:30 IST
  workflow_dispatch:
jobs:
  amfi:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:      ${{ secrets.DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCREENER_USERNAME: ${{ secrets.SCREENER_USERNAME }}
      SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Scrape AMFI NAV
        run: python _scripts/scrape_amfi.py
