name: Weekly IPO Calendar Sync

on:
  schedule:
    - cron: '30 12 * * 0'  # Every Sunday 6 PM IST (12:30 UTC)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install psycopg2-binary openpyxl requests beautifulsoup4

      - name: Sync IPO calendar from Chittorgarh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python _scripts/ipo/sync_ipo_calendar.py

      - name: Run play selector on new IPOs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python _scripts/ipo/ipo_play_selector.py

      - name: Compute BRLM scores
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python _scripts/ipo/compute_brlm_scores.py
        continue-on-error: true
