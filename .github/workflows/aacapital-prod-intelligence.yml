name: AACapital Prod Intelligence Pipeline

on:
  schedule:
    - cron: '0 3 * * 1-5'     # 8:30 AM IST pre-market
    - cron: '0 11 * * 1-5'    # 4:30 PM IST after market
    - cron: '30 2 * * 0'      # Sunday weekly archive/model refresh
  workflow_dispatch:
    inputs:
      mode:
        description: Pipeline mode
        required: false
        default: all
        type: choice
        options: [all, market, ipo, ml, commentary]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary requests beautifulsoup4 pandas numpy
          npm ci

      - name: Apply prod support migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PY'
          import os, psycopg2, pathlib
          sql = pathlib.Path('_scripts/migrations/20260617_prod_ready_tables.sql').read_text()
          conn = psycopg2.connect(os.environ['DATABASE_URL'], sslmode='require')
          cur = conn.cursor(); cur.execute(sql); conn.commit(); cur.close(); conn.close()
          PY

      - name: Refresh market and IPO intelligence
        if: ${{ github.event.inputs.mode == '' || github.event.inputs.mode == 'all' || github.event.inputs.mode == 'market' || github.event.inputs.mode == 'ipo' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
        run: python _scripts/prod/kite_sync_and_predict.py --mode ${{ github.event.inputs.mode || 'all' }}
        continue-on-error: true

      - name: Train multibagger model
        if: ${{ github.event.schedule == '30 2 * * 0' || github.event.inputs.mode == 'ml' || github.event.inputs.mode == 'all' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: python _scripts/ml/train_multibagger_model.py
        continue-on-error: true

      - name: Ingest management commentary
        if: ${{ github.event.inputs.mode == 'commentary' || github.event.inputs.mode == 'all' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: python _scripts/prod/management_commentary_pipeline.py --transcript-dir data/transcripts
        continue-on-error: true

      - name: Weekly commentary archive
        if: ${{ github.event.schedule == '30 2 * * 0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LOCAL_DATABASE_URL: ${{ secrets.LOCAL_DATABASE_URL }}
        run: python _scripts/prod/management_commentary_pipeline.py --archive --purge-days 21
        continue-on-error: true

      - name: Build verification
        run: npm run build
