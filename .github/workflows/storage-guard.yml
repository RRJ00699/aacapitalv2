# AACapital — Neon storage guard (GitHub Actions)
# Replaces: daily-purge, neon-storage-monitor  (delete those two)
name: Storage Guard
on:
  schedule:
    - cron: '30 0 * * *'     # 06:00 IST daily
  workflow_dispatch:
    inputs:
      execute: { description: 'Actually purge (else dry-run)', type: boolean, default: false }
jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: { npm ci }
      - name: Check Neon size
        run: npx tsx _scripts/check-neon-storage.ts
      - name: Purge stale Neon rows
        run: |
          pip install psycopg2-binary
          python _scripts/purge_automation.py --dry-run
          ${{ github.event.inputs.execute == 'true' && 'python _scripts/purge_automation.py --execute' || 'echo "dry-run only (scheduled)"' }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
