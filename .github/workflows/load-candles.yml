name: Load Candles to DB (LOCAL ONLY)

# ⚠️  IMPORTANT: This workflow loads candles to Neon (cloud DB).
# Candle sync should run LOCALLY using:
#   python _scripts/kite-sync-candles.py --days 1
#
# This workflow is kept for reference only.
# Do NOT trigger it — it will write candles to Neon and fill up the 512MB limit.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm you want to load candles to Neon (NOT recommended)'
        required: true
        default: 'NO'

jobs:
  load-candles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "Cancelled. Candle sync runs locally only."
            echo "Run: python _scripts/kite-sync-candles.py --days 1"
            exit 1
          fi
          echo "WARNING: Writing candles to Neon. This fills up 512MB storage."
