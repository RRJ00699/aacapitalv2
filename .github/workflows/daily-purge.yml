name: Daily Data Purge

on:
  schedule:
    - cron: '30 20 * * *'  # 2:00 AM IST daily
  workflow_dispatch:
    inputs:
      execute:
        description: 'Actually delete (default is dry-run)'
        required: false
        default: 'false'
      table:
        description: 'Specific table to purge (leave empty for all)'
        required: false
        default: ''

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - name: Dry run (scheduled)
        if: github.event_name == 'schedule'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python _scripts/purge_automation.py --dry-run

      - name: Execute purge (manual)
        if: github.event.inputs.execute == 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TABLE_FLAG=""
          if [ -n "${{ github.event.inputs.table }}" ]; then
            TABLE_FLAG="--table ${{ github.event.inputs.table }}"
          fi
          python _scripts/purge_automation.py --execute $TABLE_FLAG

      - name: Schema sync check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python _scripts/schema_sync.py --dry-run
