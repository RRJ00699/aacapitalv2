name: Daily Intelligence Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 4:30 PM IST Mon-Fri
  workflow_dispatch:
    inputs:
      skip_kite:
        description: 'Skip Kite sync'
        default: 'false'
        type: boolean

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install kiteconnect psycopg2-binary python-dotenv pandas requests beautifulsoup4 openpyxl

      - name: Sync today candles from Kite
        if: ${{ github.event.inputs.skip_kite != 'true' }}
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          KITE_API_KEY:      ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
        run: python _scripts/kite-sync-candles.py --days 1
        continue-on-error: true

      - name: Fetch FII/DII flows
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python _scripts/fetch_fii_dii.py
        continue-on-error: true

      - name: Update market regime
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          KITE_API_KEY:      ${{ secrets.KITE_API_KEY }}
          KITE_ACCESS_TOKEN: ${{ secrets.KITE_ACCESS_TOKEN }}
        run: python _scripts/engines/market_regime.py
        continue-on-error: true

      - name: Score IPO probability engine
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python _scripts/engines/ipo_probability_engine.py --all
        continue-on-error: true

      - name: Run intelligence scoring
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx _scripts/run-intelligence-scoring.ts
        continue-on-error: true

      - name: Multibagger signals
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          npx tsx _scripts/engines/indicator_calculator.ts --mode latest || true
          npx tsx _scripts/engines/multibagger_screener.ts || true
          npx tsx _scripts/sync-signals-to-neon.ts || true
        continue-on-error: true

      - name: Check Neon storage
        env:
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npx tsx _scripts/check-neon-storage.ts
        continue-on-error: true

      - name: Pipeline summary
        run: echo "Done $(date -u '+%Y-%m-%d %H:%M UTC')"
